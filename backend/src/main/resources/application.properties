server.port=8090

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/content_management_db
spring.data.mongodb.database=content_management_db

# No JPA configuration needed (MongoDB, not SQL)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# JWT Configuration
app.jwtSecret=mySecretKeyForJWTTokenProviderApplicationShouldBeAtLeastThirtyTwoCharactersLongForHS256Algorithm
app.jwtExpirationMs=86400000
